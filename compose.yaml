services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: playbookredline
      POSTGRES_USER: playbookredline
      POSTGRES_PASSWORD: playbookredline
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playbookredline -d playbookredline"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  server:
    build:
      context: ./server
    environment:
      PORT: 3001
      CORS_ORIGIN: https://playbookredline.187-124-249-117.sslip.io,http://localhost:5173,http://localhost:8080
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-sonnet-4}
      DATABASE_URL: postgresql://playbookredline:playbookredline@postgres:5432/playbookredline
      APP_URL: ${APP_URL:-https://playbookredline.187-124-249-117.sslip.io}
      JWT_SECRET: ${JWT_SECRET:-playbookredline-dev-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  client:
    build:
      context: ./client
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    depends_on:
      server:
        condition: service_healthy
      client:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
