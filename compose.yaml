services:
  server:
    build:
      context: ./server
    environment:
      PORT: 3001
      CORS_ORIGIN: http://localhost:8080
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5

  client:
    build:
      context: ./client
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "8080:80"
